# narrator-zimage.yaml — EXACT ai-toolkit config that produced the working narrator LoRA.
#
# Run:     2026-07-01, RunPod `ostris/aitoolkit:latest` (RTX 5090, EU-RO-1, Secure Cloud),
#          executed via CLI: `cd /app/ai-toolkit && python run.py narrator-zimage.yaml`.
# Result:  step-1500 checkpoint shipped (narrator-zimage.safetensors). See character-lora-plan.md
#          Phases 3-5. Base→Turbo inference needs ~2.0 strength + a skin-tone cue in canon.
# Trigger: the token `chrsnrtr` lives IN the captions (trigger_word left null).
# Dataset: 12 images + .txt captions in ~/agent-data/visual-generation/lora/narrator/dataset/
#          (off-git; airdrop-synced).
#
# As-RUN edits already applied below vs. the ai-toolkit UI's exported config:
#   • logging.use_ui_logger: false  — bypassed the wedged UI worker queue (ran headless via CLI).
#   • meta.name: narrator-zimage    — was the UI placeholder '[name]'.
#
# ⚠ For REUSE (e.g. scripts/lora-train), change training_folder to /mnt/output (the persistent
#   network volume) — this run used /app/ai-toolkit/output (container disk), which is wiped on a
#   pod cycle; we only saved the checkpoints by cp'ing to /mnt in time.
job: extension
config:
  name: narrator-zimage
  process:
  - type: diffusion_trainer
    training_folder: /app/ai-toolkit/output
    sqlite_db_path: ./aitk_db.db
    device: cuda
    trigger_word: null
    performance_log_every: 10
    network:
      type: lora
      linear: 8
      linear_alpha: 8
      lokr_full_rank: true
      lokr_factor: -1
      network_kwargs:
        ignore_if_contains: []
      conv: 16
      conv_alpha: 16
    save:
      dtype: bf16
      save_every: 250
      max_step_saves_to_keep: 12
      save_format: diffusers
      push_to_hub: false
    datasets:
    - folder_path: /app/ai-toolkit/datasets/narrator
      mask_path: null
      mask_min_value: 0.1
      default_caption: ''
      caption_ext: txt
      caption_dropout_rate: 0.05
      cache_latents_to_disk: true
      is_reg: false
      network_weight: 1
      resolution:
      - 512
      - 768
      - 1024
      controls: []
      shrink_video_to_frames: true
      num_frames: 1
      flip_x: true
      flip_y: false
      num_repeats: 1
    train:
      batch_size: 2
      bypass_guidance_embedding: false
      steps: 3000
      gradient_accumulation: 1
      train_unet: true
      train_text_encoder: false
      gradient_checkpointing: true
      noise_scheduler: flowmatch
      optimizer: adamw8bit
      timestep_type: weighted
      content_or_style: balanced
      optimizer_params:
        weight_decay: 0.0001
      unload_text_encoder: false
      cache_text_embeddings: true
      lr: 5.0e-05
      ema_config:
        use_ema: false
        ema_decay: 0.99
      skip_first_sample: false
      force_first_sample: true
      disable_sampling: false
      dtype: bf16
      diff_output_preservation: false
      diff_output_preservation_multiplier: 1
      diff_output_preservation_class: person
      switch_boundary_every: 1
      loss_type: mse
    logging:
      log_every: 1
      use_ui_logger: false
    model:
      name_or_path: Tongyi-MAI/Z-Image
      quantize: true
      qtype: qfloat8
      quantize_te: true
      qtype_te: qfloat8
      arch: zimage
      low_vram: true
      model_kwargs: {}
      compile: false
      layer_offloading: false
      layer_offloading_text_encoder_percent: 1
      layer_offloading_transformer_percent: 1
    sample:
      sampler: flowmatch
      sample_every: 250
      width: 1024
      height: 1024
      samples:
      - prompt: chrsnrtr, stop-motion puppet, front view, full body, standing in a sunny park
      - prompt: chrsnrtr, stop-motion puppet, front view, close-up portrait, soft smile, plain background
      - prompt: chrsnrtr, stop-motion puppet, rear view from behind, full body, walking down a beach at sunset
      - prompt: chrsnrtr, stop-motion puppet, three-quarter view, full body, standing in a kitchen
      neg: ''
      seed: 42
      walk_seed: false
      guidance_scale: 4
      sample_steps: 30
      num_frames: 1
      fps: 1
meta:
  name: narrator-zimage
  version: '1.0'
