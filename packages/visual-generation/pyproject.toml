[project]
name = "visual-generation"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "agent-runtime",
    "click>=8.0",
    "httpx>=0.27",
]

[project.scripts]
visual-generation = "visual_generation.cli:cli"

[tool.uv.sources]
agent-runtime = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/visual_generation"]
