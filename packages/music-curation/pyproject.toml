[project]
name = "music-curation"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "agent-runtime",
]

[tool.uv.sources]
agent-runtime = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/music_curation"]
