[project]
name = "technique-research"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "agent-runtime",
    "tutorial-research",
    "anthropic>=0.40",
    "tavily-python>=0.3",
    "yt-dlp>=2024.1",
    "click>=8.0",
]

[project.scripts]
technique-research = "technique_research.cli:cli"

[tool.uv.sources]
agent-runtime = { workspace = true }
tutorial-research = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/technique_research"]
