[project]
name = "voiceover-direction"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "agent-runtime",
    "elevenlabs>=1.0",
    "click>=8.0",
]

[project.scripts]
voiceover-direction = "voiceover_direction.cli:cli"

[tool.uv.sources]
agent-runtime = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voiceover_direction"]
