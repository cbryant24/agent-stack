[project]
name = "orchestrator"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "agent-runtime",
    "tutorial-research",
    "music-curation",
    "langgraph>=1.0",
    "langgraph-checkpoint-sqlite>=2.0",
    "langchain-anthropic>=1.0",
    "click>=8.0",
]

[project.scripts]
orchestrator = "orchestrator.cli:cli"

[tool.uv.sources]
agent-runtime = { workspace = true }
tutorial-research = { workspace = true }
music-curation = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestrator"]
