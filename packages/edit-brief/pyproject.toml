[project]
name = "edit-brief"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "agent-runtime",
    "anthropic>=0.40",
    "click>=8.0",
]

[project.scripts]
edit-brief = "edit_brief.cli:cli"

[tool.uv.sources]
agent-runtime = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/edit_brief"]
