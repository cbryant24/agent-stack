[project]
name = "yt-intelligence-pipeline"
version = "0.1.0"
description = "YouTube tutorial ingestion pipeline: Obsidian notes for humans, Qdrant vectors for agents."
requires-python = ">=3.12"
dependencies = [
    # LLM orchestration
    "langchain>=0.3",
    "langchain-anthropic>=0.3",
    "langsmith>=0.1",
    # Transcript + video tooling
    "youtube-transcript-api>=0.6",
    "yt-dlp>=2024.1",
    "openai-whisper",
    # Config + utilities
    "python-dotenv>=1.0",
    "tenacity>=8.2",
    "anthropic>=0.40",
    # Workspace dependency
    "agent-runtime",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yt_intelligence_pipeline"]

[project.scripts]
yt-pipeline = "yt_intelligence_pipeline.main:cli"

[tool.uv.sources]
agent-runtime = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
