services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI
      - "127.0.0.1:4318:4318"     # OTLP HTTP
    networks:
      - agent-net
    restart: unless-stopped

networks:
  agent-net:
    driver: bridge

volumes:
  qdrant_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AGENT_DATA_DIR:-${HOME}/agent-data}/qdrant
      